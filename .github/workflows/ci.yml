name: Java Maven + Docker CI
on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: springboot-github-actions
  IMAGE_TAG: latest

jobs:
  checkout:
    name: Checkout Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  build:
    name: Build Stage
    runs-on: ubuntu-latest
    needs: checkout

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # ✅ DEBUG: Check target folder
      - name: Debug - List target folder
        run: |
          echo "Listing target directory:"
          ls -l target || echo "target folder not found"

      # ✅ VALIDATION: Ensure JAR exists
      - name: Validate JAR exists
        run: |
          if ls target/*.jar 1> /dev/null 2>&1; then
            echo "✅ JAR file found"
          else
            echo "❌ ERROR: JAR file not found in target/"
            exit 1
          fi

      # ✅ Upload artifact (FIX for your Docker error)
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  docker-build:
    name: Docker Build Stage
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Download artifact
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      # ✅ Prepare correct structure for Dockerfile
      - name: Prepare target folder
        run: |
          mkdir -p target
          mv *.jar target/

      # ✅ DEBUG: Verify file before docker build
      - name: Debug - Verify JAR before Docker build
        run: |
          echo "Checking files before Docker build:"
          ls -R

      # ✅ VALIDATION: Fail if jar missing
      - name: Validate JAR before Docker build
        run: |
          if ls target/*.jar 1> /dev/null 2>&1; then
            echo "✅ JAR ready for Docker build"
          else
            echo "❌ ERROR: Missing JAR before Docker build"
            exit 1
          fi

      # ✅ Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

  docker-push:
    name: Docker Push Stage
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      # ✅ Validate secrets before login
      - name: Validate Docker credentials
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "❌ Docker credentials not set"
            exit 1
          else
            echo "✅ Docker credentials available"
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Push image
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
