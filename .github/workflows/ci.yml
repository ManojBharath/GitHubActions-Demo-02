name: Java Maven + Docker CI (Stage-wise with Artifacts)
on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: springboot-github-actions
  IMAGE_TAG: latest

jobs:
  checkout:
    name: Checkout Stage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

  build:
    name: Build Stage (Maven)
    runs-on: ubuntu-latest
    needs: checkout

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build with Maven
        #run: mvn clean package -DskipTests
        run: mvn clean package

      # ✅ Debug
      - name: Debug - List target folder
        run: |
          echo "Listing target directory:"
          ls -l target || echo "target folder not found"

      # ✅ Validate JAR exists
      - name: Validate JAR exists
        run: |
          if ls target/*.jar 1> /dev/null 2>&1; then
            echo "✅ JAR file found"
          else
            echo "❌ ERROR: JAR file not found"
            exit 1
          fi

      # ✅ Upload JAR
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  docker-build:
    name: Docker Build Stage
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Download JAR
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      # ✅ Prepare structure
      - name: Prepare target folder
        run: |
          mkdir -p target
          mv *.jar target/

      # ✅ Debug
      - name: Debug - Verify files
        run: |
          echo "Listing all files:"
          ls -R

      # ✅ Validate JAR before docker
      - name: Validate JAR before Docker build
        run: |
          if ls target/*.jar 1> /dev/null 2>&1; then
            echo "✅ JAR ready"
          else
            echo "❌ ERROR: JAR missing before Docker build"
            exit 1
          fi

      # ✅ Build image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      # ✅ Verify image exists
      - name: Verify Docker Image
        run: docker images

      # ✅ Save image
      - name: Save Docker Image
        run: |
          docker save ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -o image.tar

      # ✅ Upload image
      - name: Upload Docker Image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  docker-push:
    name: Docker Push Stage
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      # ✅ Download image
      - name: Download Docker Image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      # ✅ Load image
      - name: Load Docker Image
        run: |
          docker load -i image.tar

      # ✅ Verify image exists
      - name: Verify Docker Image
        run: docker images

      # ✅ Validate secrets
      - name: Validate Docker credentials
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "❌ Docker credentials missing"
            exit 1
          else
            echo "✅ Docker credentials OK"
          fi

      # ✅ Login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Push image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
